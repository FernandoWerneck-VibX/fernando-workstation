---
- name: Atualizar sistema
  apt:
    update_cache: yes
    cache_valid_time: "{{ apt_cache_valid_time }}"
    upgrade: dist

- name: Remover apps desnecessários
  apt:
    name:
      - firefox
      - geary
      - "libreoffice*"
      - rhythmbox
      - remmina
      - totem
      - gnome-maps
      - gnome-weather
      - gnome-clocks
      - gnome-contacts
      - gnome-characters
      - gnome-mahjongg
      - gnome-mines
      - gnome-sudoku
    purge: yes
    autoremove: yes
    state: absent

- name: Instalar pacotes essenciais
  apt:
    name:
      - build-essential
      - curl
      - wget
      - git
      - ca-certificates
      - apt-transport-https
      - unzip
      - zip
      - tar
      - htop
      - fzf
      - ripgrep
      - bat
      - gpg
      - jq
      - bash-completion
      - file
      - software-properties-common
      - fuse3

- name: Permitir FUSE allow_other
  lineinfile:
    path: /etc/fuse.conf
    line: "user_allow_other"
    state: present
    create: yes

- name: Otimizar sysctl
  copy:
    dest: /etc/sysctl.d/99-performance.conf
    content: |
      vm.swappiness=10
      vm.dirty_ratio=3
      vm.dirty_background_ratio=3
      fs.inotify.max_user_watches=524288
      fs.inotify.max_user_instances=512

- command: sysctl --system

- name: Verificar gsettings
  command: which gsettings
  register: gsettings_check
  changed_when: false
  failed_when: false

- name: Desativar animações GNOME
  become_user: "{{ dev_user }}"
  shell: gsettings set org.gnome.desktop.interface enable-animations false
  when: gsettings_check.rc == 0
  changed_when: false
  failed_when: false

- name: Configurar ZRAM
  copy:
    dest: /etc/systemd/zram-generator.conf
    content: |
      [zram0]
      zram-size = ram / 2
      compression-algorithm = zstd

- name: Verificar batcat
  stat:
    path: /usr/bin/batcat
  register: batcat_stat

- name: Verificar bat
  stat:
    path: /usr/bin/bat
  register: bat_stat

- name: Criar symlink bat -> batcat
  file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
  when: batcat_stat.stat.exists and not bat_stat.stat.exists
