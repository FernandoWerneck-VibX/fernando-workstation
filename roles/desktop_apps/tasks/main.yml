---
- name: Instalar Flatpak
  apt:
    name: flatpak
    state: present

- name: Adicionar Flathub (system)
  command: >
    flatpak remote-add --if-not-exists --system
    {{ flatpak_remote_name }} {{ flatpak_remote_url }}
  changed_when: false

- name: Garantir keyrings do apt
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Verificar se IntelliJ IDEA Ultimate oficial sera instalada
  set_fact:
    desktop_apps_install_intellij_official: "{{ (desktop_apps_catalog | selectattr('id', 'equalto', 'intellij-idea-ultimate') | list | length) > 0 }}"

- name: Inicializar catalogo resolvido de apps desktop sem IntelliJ dinamico
  set_fact:
    desktop_apps_resolved: "{{ desktop_apps_catalog | rejectattr('id', 'equalto', 'intellij-idea-ultimate') | list }}"

- name: Consultar release oficial mais recente do IntelliJ IDEA Ultimate
  uri:
    url: https://data.services.jetbrains.com/products/releases?code=IIU&latest=true&type=release
    return_content: yes
    headers:
      User-Agent: ansible
  register: intellij_release_latest
  changed_when: false
  when: desktop_apps_install_intellij_official

- name: Falhar se nao conseguir consultar release oficial do IntelliJ IDEA Ultimate
  fail:
    msg: "Falha ao consultar release oficial do IntelliJ IDEA Ultimate na JetBrains. Verifique rede/proxy."
  when:
    - desktop_apps_install_intellij_official
    - intellij_release_latest.status is not defined or intellij_release_latest.status != 200

- name: Montar app resolvido do IntelliJ IDEA Ultimate
  set_fact:
    desktop_apps_intellij_resolved: >-
      {{
        desktop_apps_intellij_base
        | combine(
            {
              'fallback': (
                desktop_apps_intellij_base.fallback
                | combine(
                    {
                      'tarball': (
                        intellij_release_latest.json.IIU[0].downloads.linux.link
                        if ansible_architecture == 'x86_64'
                        else intellij_release_latest.json.IIU[0].downloads.linuxARM64.link
                      ),
                      'tarball_checksum_url': (
                        intellij_release_latest.json.IIU[0].downloads.linux.checksumLink
                        if ansible_architecture == 'x86_64'
                        else intellij_release_latest.json.IIU[0].downloads.linuxARM64.checksumLink
                      ),
                      'desired_version': intellij_release_latest.json.IIU[0].version
                    }
                  )
              )
            },
            recursive=True
          )
      }}
  when: desktop_apps_install_intellij_official

- name: Adicionar IntelliJ IDEA Ultimate resolvido ao catalogo final
  set_fact:
    desktop_apps_resolved: "{{ desktop_apps_resolved + [desktop_apps_intellij_resolved] }}"
  when: desktop_apps_install_intellij_official

- name: Instalar apps desktop via Flatpak com fallback
  include_tasks: install_single_app.yml
  loop: "{{ desktop_apps_resolved }}"
  loop_control:
    loop_var: desktop_app
    label: "{{ desktop_app.id }}"

- name: Validar apps desktop instalados
  shell: |
    is_pkg_installed() {
      local pkg="$1"
      [ -n "$pkg" ] || return 1
      [ "$(dpkg-query -W -f='${db:Status-Status}' "$pkg" 2>/dev/null || true)" = "installed" ]
    }
    if flatpak info --system "{{ item.id }}" >/dev/null 2>&1; then exit 0; fi
    if is_pkg_installed "{{ (item.fallback.apt | default('')) if item.fallback is defined else '' }}"; then exit 0; fi
    if is_pkg_installed "{{ (item.fallback.apt_package | default('')) if item.fallback is defined else '' }}"; then exit 0; fi
    if is_pkg_installed "{{ (item.fallback.package_name | default('')) if item.fallback is defined else '' }}"; then exit 0; fi
    if [ -n "{{ (item.fallback.validate_path | default('')) if item.fallback is defined else '' }}" ] && [ -e "{{ (item.fallback.validate_path | default('')) if item.fallback is defined else '' }}" ]; then
      if [ -n "{{ (item.fallback.desired_version | default('')) if item.fallback is defined else '' }}" ] && [ -n "{{ (item.fallback.version_file | default('')) if item.fallback is defined else '' }}" ]; then
        current_version="$(jq -r '.{{ (item.fallback.version_json_key | default('version')) if item.fallback is defined else 'version' }}' "{{ (item.fallback.version_file | default('')) if item.fallback is defined else '' }}" 2>/dev/null || true)"
        [ "$current_version" = "{{ (item.fallback.desired_version | default('')) if item.fallback is defined else '' }}" ] && exit 0
      else
        exit 0
      fi
    fi
    exit 1
  args:
    executable: /bin/bash
  register: app_validation
  changed_when: false
  failed_when: false
  loop: "{{ desktop_apps_resolved }}"
  loop_control:
    label: "{{ item.id }}"

- name: Falhar se app desktop nao validado
  fail:
    msg: "Falha ao validar {{ item.item.id }}. Verifique rede/Flathub, repositorios apt/deb ou fallback definido."
  when: item.rc != 0
  loop: "{{ app_validation.results }}"
  loop_control:
    label: "{{ item.item.id }}"

- name: Verificar app padrao atual para Markdown
  become_user: "{{ dev_user }}"
  command: xdg-mime query default {{ item }}
  register: markdown_mime_defaults
  changed_when: false
  failed_when: false
  loop: "{{ desktop_apps_markdown_mime_types }}"
  loop_control:
    label: "{{ item }}"

- name: Configurar VS Code como app padrao para Markdown
  become_user: "{{ dev_user }}"
  command: xdg-mime default {{ desktop_apps_vscode_markdown_desktop }} {{ item.item }}
  when: (item.stdout | default('') | trim) != desktop_apps_vscode_markdown_desktop
  loop: "{{ markdown_mime_defaults.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Verificar app padrao atual para PDF
  become_user: "{{ dev_user }}"
  command: xdg-mime query default {{ item }}
  register: pdf_mime_defaults
  changed_when: false
  failed_when: false
  loop: "{{ desktop_apps_pdf_mime_types }}"
  loop_control:
    label: "{{ item }}"

- name: Configurar Chrome como app padrao para PDF
  become_user: "{{ dev_user }}"
  command: xdg-mime default {{ desktop_apps_chrome_pdf_desktop }} {{ item.item }}
  when: (item.stdout | default('') | trim) != desktop_apps_chrome_pdf_desktop
  loop: "{{ pdf_mime_defaults.results }}"
  loop_control:
    label: "{{ item.item }}"
