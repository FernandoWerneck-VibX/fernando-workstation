---
- name: Remover apps desnecessarios na etapa final
  apt:
    name: "{{ cleanup_apps_packages }}"
    purge: yes
    autoremove: yes
    state: absent

- name: Remover apps Flatpak desnecessarios na etapa final
  command: flatpak uninstall -y --system {{ item }}
  register: cleanup_flatpak_removed
  changed_when: cleanup_flatpak_removed.rc == 0
  failed_when: false
  loop: "{{ cleanup_apps_flatpaks }}"
  loop_control:
    label: "{{ item }}"

- name: Executar limpeza final do apt
  apt:
    autoremove: yes
    autoclean: yes

- name: Remover runtimes Flatpak nao utilizados
  command: flatpak uninstall -y --unused --system
  register: cleanup_flatpak_unused
  changed_when: >-
    cleanup_flatpak_unused.rc == 0 and
    'Nothing unused to uninstall' not in (cleanup_flatpak_unused.stdout | default('')) and
    'Nada para desinstalar' not in (cleanup_flatpak_unused.stdout | default(''))
