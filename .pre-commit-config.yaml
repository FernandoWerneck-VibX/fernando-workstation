repos:
  - repo: local
    hooks:
      - id: bash-syntax
        name: Bash syntax
        entry: bash -c 'for file in "$@"; do bash -n "$file"; done' --
        language: system
        files: \.sh$
      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        files: \.(yml|yaml)$
      - id: ansible-lint
        name: ansible-lint
        entry: ansible-lint
        language: system
        pass_filenames: false
